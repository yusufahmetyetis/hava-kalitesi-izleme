networks:
  aqi-network:
    driver: bridge

volumes:
  timescale_data:

services:
  mosquitto:
    image: eclipse-mosquitto:2
    networks:
      - aqi-network
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    networks:
      - aqi-network
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: aqi_db
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./timescaledb/init:/docker-entrypoint-initdb.d

  aqi-publisher:
    build:
      context: .
      dockerfile: mqtt/Dockerfile
    command: ["python", "mqtt/publisher.py"]
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      WAQI_TOKEN: ${WAQI_TOKEN}
    networks:
      - aqi-network
    depends_on:
      - mosquitto
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_NAME: aqi_db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: "8000"
    networks:
      - aqi-network
    ports:
      - "8000:8000"
    depends_on:
      - timescaledb
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - aqi-network
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: on-failure

  flink-jobmanager:
    # TODO: placeholder, no custom image yet
    image: flink:1.19-scala_2.12-java11
    command: jobmanager
    networks:
      - aqi-network
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: flink-jobmanager
        rest.port: 8081
    restart: always

  flink-taskmanager:
    build:
      context: ./flink-taskmanager
      dockerfile: Dockerfile
    command: taskmanager
    networks:
      - aqi-network
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_NAME: energy_demo
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: always

  flink-job:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_NAME: energy_demo
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    command: >
      bash -c "sleep 15 &&
      flink run
      -m flink-jobmanager:8081
      -c com.energydemo.EnergyStreamJob
      /app/energy-flink-job.jar"
    networks:
      - aqi-network
    depends_on:
      - mosquitto
      - timescaledb
      - flink-jobmanager
      - flink-taskmanager
    restart: on-failure

  aqi-flink-job:
    build:
      context: ./aqi-flink-job
      dockerfile: Dockerfile
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_NAME: aqi_db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    command: >
      bash -c "sleep 15 &&
      flink run
      -m flink-jobmanager:8081
      -c com.aqipipeline.AqiFlinkJob
      /app/aqi-flink-job.jar"
    networks:
      - aqi-network
    depends_on:
      - mosquitto
      - timescaledb
      - flink-jobmanager
      - flink-taskmanager
    restart: on-failure

  energy-publisher:
    build:
      context: ./energy/publisher
      dockerfile: Dockerfile
    networks:
      - aqi-network
    depends_on:
      - mosquitto
    restart: on-failure
